name: iOS Build (Proof of Concept)

on:
 push:
  branches: [ main, develop ]
 pull_request:
  branches: [ main, develop ]
 workflow_dispatch:

jobs:
 build:
  runs-on: [self-hosted, macbook]

  steps:
  - name: Checkout core repo
    uses: actions/checkout@v4

  - name: Select Xcode
    uses: maxim-lobanov/setup-xcode@v1
    with:
     xcode-version: 'latest-stable'

  - name: Copy local swift-ogg package into workspace
    run: |
     mkdir -p deps/swift-ogg
     cp -r ~/Projects/swift-packages/swift-ogg/* deps/swift-ogg/
     ls -la deps/swift-ogg # just for debug, shows what was copied

  - name: Build Xabber.app (debug scheme)
    run: |
     xcodebuild \
      -scheme debug \
      -sdk iphonesimulator \
      -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=26.0' \
      clean build

  - name: Locate built .app
    id: find-app
    run: |
     APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData \
      -name "xabber.app" -type d \
      | grep -i Debug-iphonesimulator | head -n 1)
     if [ -z "$APP_PATH" ]; then
      echo "Error: xabber.app not found in DerivedData"
      exit 1
     fi
     echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
     echo "App built at: $APP_PATH"

  - name: Upload built .app as artifact
    uses: actions/upload-artifact@v4
    with:
     name: xabber-simulator-app
     path: ${{ steps.find-app.outputs.app_path }}
     retention-days: 7