name: iOS Build + Remote Appium Test

on:
 push:
  branches: [ main, develop ]
 pull_request:
  branches: [ main, develop ]
 workflow_dispatch:     # ← allows manual trigger from GitHub UI
  inputs:
   trigger_reason:
    description: 'Why are you running this? (optional)'
    required: false

jobs:
 build-ios:
  runs-on: [self-hosted, macbook]  # ← your runner label

  steps:
   # Checkout only the core repo
  - name: Checkout xabber_ios_core
    uses: actions/checkout@v4

   # Setup Xcode
  - name: Select Xcode
    uses: maxim-lobanov/setup-xcode@v1
    with:
     xcode-version: 'latest-stable'

   # Build the app for simulator (adjust scheme/device as needed)
  - name: Build Xabber.app (debug scheme)
    run: |
     xcodebuild \
      -scheme debug \
      -sdk iphonesimulator \
      -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=26.0' \
      clean build

   # Find the .app path (DerivedData is per-build, so we locate it)
  - name: Locate built .app
    id: find-app
    run: |
     APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData \
      -name "xabber.app" -type d \
      | grep -i Debug-iphonesimulator | head -n 1)
     if [ -z "$APP_PATH" ]; then
      echo "Error: xabber.app not found"
      exit 1
     fi
     echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT
     echo "App found: $APP_PATH"
 # 7. Run WDIO/Appium E2E tests
  - name: Run WDIO tests
    env:
     APP_PATH: ${{ steps.find-app.outputs.APP_PATH }}
    run: |
     # Pass dynamic APP_PATH to WDIO (read in wdio.conf.ts via process.env.APP_PATH)
     npx wdio run test/specs/test.e2e.ts # ← your exact path to spec file
   # Optional: Upload .app on failure for debugging
  - name: Upload .app on failure
    if: failure()
    uses: actions/upload-artifact@v4
    with:
     name: xabber-simulator-app-failed
     path: ${{ steps.find-app.outputs.app_path }}
     retention-days: 3